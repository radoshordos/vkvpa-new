<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 230" width="1060" height="230"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img"
     aria-label="Životní cyklus závodního kola: Nadcházející → Probíhá → Příjem hlášení → Zpracování výsledků → Vyhodnocené">

  <defs>
    <!-- Arrow markers -->
    <marker id="arr-auto" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#4338ca"/>
    </marker>
    <marker id="arr-manual" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#15803d"/>
    </marker>
    <marker id="arr-neutral" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#64748b"/>
    </marker>
    <!-- Drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1060" height="230" fill="#f8fafc" rx="12"/>

  <!-- ── Title ── -->
  <text x="530" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a"
        letter-spacing="0.2">Životní cyklus závodního kola</text>
  <text x="530" y="44" text-anchor="middle" font-size="11" fill="#64748b">KoloStav · odvozeno z času (a u Vyhodnocené i z převzetí záznamů)</text>

  <!-- ════════════════════════════════════════════════════════════════
       STATE BOXES  (top=68, height=76, center_y=106)
       Box centers x: 85, 252, 435, 634, 840
       ════════════════════════════════════════════════════════════════ -->

  <!-- ① Nadcházející (badge-muted: bg #f1f5f9, border #cbd5e1) -->
  <rect x="20" y="68" width="130" height="76" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Nadcházející</text>
  <line x1="35" y1="106" x2="135" y2="106" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="120" text-anchor="middle" font-size="9.5" fill="#94a3b8">start závodu</text>
  <text x="85" y="133" text-anchor="middle" font-size="9.5" fill="#94a3b8">datum_konani &gt; nyní</text>

  <!-- ② Probíhá (badge-ok: bg #f0fdf4, border #86efac) -->
  <rect x="202" y="68" width="100" height="76" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="252" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Probíhá</text>
  <line x1="217" y1="106" x2="287" y2="106" stroke="#bbf7d0" stroke-width="1"/>
  <text x="252" y="120" text-anchor="middle" font-size="9.5" fill="#16a34a">závodní okno běží</text>
  <text x="252" y="133" text-anchor="middle" font-size="9.5" fill="#16a34a">08:00–11:00 UTC</text>

  <!-- ③ Příjem hlášení (badge-warn: bg #fffbeb, border #fde68a) -->
  <rect x="358" y="68" width="154" height="76" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="435" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Příjem hlášení</text>
  <line x1="373" y1="106" x2="497" y2="106" stroke="#fde68a" stroke-width="1"/>
  <text x="435" y="120" text-anchor="middle" font-size="9.5" fill="#d97706">závod skončil</text>
  <text x="435" y="133" text-anchor="middle" font-size="9.5" fill="#d97706">datum_uzaverky &gt; nyní</text>

  <!-- ④ Zpracování výsledků (badge-brand: bg #eef2ff, border #a5b4fc) -->
  <rect x="568" y="68" width="132" height="76" rx="10" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="634" y="92" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4338ca">Zpracování</text>
  <text x="634" y="106" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4338ca">výsledků</text>
  <line x1="583" y1="113" x2="685" y2="113" stroke="#c7d2fe" stroke-width="1"/>
  <text x="634" y="127" text-anchor="middle" font-size="9.5" fill="#6366f1">uzávěrka uplynula</text>
  <text x="634" y="140" text-anchor="middle" font-size="9.5" fill="#6366f1">vyhodnoceno = null</text>

  <!-- ⑤ Vyhodnocené (badge-muted) -->
  <rect x="756" y="68" width="130" height="76" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="821" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Vyhodnocené</text>
  <line x1="771" y1="106" x2="871" y2="106" stroke="#e2e8f0" stroke-width="1"/>
  <text x="821" y="120" text-anchor="middle" font-size="9.5" fill="#94a3b8">vyhodnoceno ≠ null</text>
  <text x="821" y="133" text-anchor="middle" font-size="9.5" fill="#94a3b8">výsledky publikovány</text>

  <!-- Termination circle -->
  <circle cx="916" cy="106" r="10" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="916" cy="106" r="6" fill="#475569"/>
  <line x1="886" y1="106" x2="905" y2="106" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-neutral)"/>

  <!-- ════════════════════════════════════════════════════════════════
       ARROWS between boxes
       ════════════════════════════════════════════════════════════════ -->

  <!-- Arrow ①→② (auto, cron) -->
  <line x1="152" y1="106" x2="195" y2="106" stroke="#4338ca" stroke-width="1.8" marker-end="url(#arr-auto)"/>
  <!-- Arrow ②→③ (auto, cron) -->
  <line x1="304" y1="106" x2="351" y2="106" stroke="#4338ca" stroke-width="1.8" marker-end="url(#arr-auto)"/>
  <!-- Arrow ③→④ (auto, deadline) -->
  <line x1="514" y1="106" x2="561" y2="106" stroke="#4338ca" stroke-width="1.8" marker-end="url(#arr-auto)"/>
  <!-- Arrow ④→⑤ (manual, admin) -->
  <line x1="702" y1="106" x2="749" y2="106" stroke="#15803d" stroke-width="1.8" marker-end="url(#arr-manual)"/>

  <!-- ════════════════════════════════════════════════════════════════
       TRANSITION LABELS (above arrows, y≈60–65)
       ════════════════════════════════════════════════════════════════ -->

  <!-- ①→② label -->
  <text x="174" y="59" text-anchor="middle" font-size="8.5" fill="#4338ca" font-weight="600">start závodu</text>
  <text x="174" y="70" text-anchor="middle" font-size="8" fill="#6366f1">datum_konani · 08:00 UTC</text>

  <!-- ②→③ label -->
  <text x="328" y="59" text-anchor="middle" font-size="8.5" fill="#4338ca" font-weight="600">konec závodu</text>
  <text x="328" y="70" text-anchor="middle" font-size="8" fill="#6366f1">start + 3 h · 11:00 UTC</text>

  <!-- ③→④ label -->
  <text x="538" y="59" text-anchor="middle" font-size="8.5" fill="#4338ca" font-weight="600">uzávěrka uplynula</text>
  <text x="538" y="70" text-anchor="middle" font-size="8" fill="#6366f1">pátek 23:59 UTC</text>

  <!-- ④→⑤ label -->
  <text x="726" y="57" text-anchor="middle" font-size="8.5" fill="#15803d" font-weight="600">vše převzato / +20 dní</text>
  <text x="726" y="69" text-anchor="middle" font-size="8" fill="#16a34a">denní cron → vyhodnoceno</text>

  <!-- ════════════════════════════════════════════════════════════════
       LEGEND  (bottom bar)
       ════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="162" width="1020" height="1" fill="#e2e8f0"/>

  <!-- Legend: automatic transition -->
  <line x1="30" y1="178" x2="65" y2="178" stroke="#4338ca" stroke-width="2" marker-end="url(#arr-auto)"/>
  <text x="72" y="182" font-size="10" fill="#475569">automatický přechod uplynutím času (žádný cron)</text>

  <!-- Legend: evaluation transition -->
  <line x1="370" y1="178" x2="405" y2="178" stroke="#15803d" stroke-width="2" marker-end="url(#arr-manual)"/>
  <text x="412" y="182" font-size="10" fill="#475569">vyhodnocení kola: vše převzato nebo +20 dní od uzávěrky (denní cron)</text>

  <!-- Legend: terminal state -->
  <circle cx="680" cy="178" r="8" fill="none" stroke="#475569" stroke-width="1.5"/>
  <circle cx="680" cy="178" r="5" fill="#475569"/>
  <text x="693" y="182" font-size="10" fill="#475569">terminální stav</text>

  <!-- Legend: DB columns -->
  <text x="30" y="207" font-size="9.5" fill="#94a3b8">
    DB sloupce VkvpaKola:
    <tspan font-weight="600" fill="#475569">datum_konani</tspan>
    (datetime · start závodu) ·
    <tspan font-weight="600" fill="#475569">datum_uzaverky</tspan>
    (datetime) ·
    <tspan font-weight="600" fill="#475569">vyhodnoceno</tspan>
    (datetime|null)
  </text>
</svg>
