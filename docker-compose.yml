services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./:/var/www/html
        ports:
            - "8080:80"
        depends_on:
            db:
                condition: service_healthy
    db:
        image: mysql:8.0
        command: --sql-mode="ALLOW_INVALID_DATES"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-digipa}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
        volumes:
            - dbdata:/var/lib/mysql
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-secret}"]
            interval: 10s
            timeout: 5s
            retries: 10
volumes:
    dbdata:
