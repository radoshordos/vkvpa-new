version: 2

updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      laravel:
        patterns:
          - "laravel/*"
      dev-tools:
        patterns:
          - "larastan/*"
          - "laravel/pint"
          - "phpstan/*"
          - "phpunit/*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
